<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>sriansantos — Back-end Fighter</title>
  <desc>Animated profile card for GitHub user sriansantos</desc>
  <defs>
    <style>
      @keyframes punch {
        0%,100% { transform: translateX(0); }
        40%      { transform: translateX(26px) scaleX(1.08); }
        60%      { transform: translateX(20px); }
      }
      @keyframes blink {
        0%,88%,100% { transform: scaleY(1); }
        94%         { transform: scaleY(0.05); }
      }
      @keyframes float {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-8px); }
      }
      @keyframes floatB {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-12px); }
      }
      @keyframes glitch {
        0%,100% { transform: translate(0,0); fill: #00ffa3; }
        8%      { transform: translate(-2px,0); fill: #ff3c6e; }
        16%     { transform: translate(2px,0); fill: #00ffa3; }
        24%     { transform: translate(0,0); }
      }
      @keyframes scanline {
        0%   { transform: translateY(-360px); }
        100% { transform: translateY(360px); }
      }
      @keyframes cursor {
        0%,49%  { opacity: 1; }
        50%,100%{ opacity: 0; }
      }
      @keyframes typeline {
        0%   { clip-path: inset(0 100% 0 0); }
        100% { clip-path: inset(0 0% 0 0); }
      }
      @keyframes shockwave {
        0%   { r: 4;  opacity: 1; }
        100% { r: 38; opacity: 0; }
      }
      @keyframes flamepulse {
        0%,100%{ transform: scaleY(1) translateY(0);   opacity:.85; }
        50%    { transform: scaleY(1.22) translateY(-5px); opacity:1; }
      }
      @keyframes comboflash {
        0%,100%{ opacity: 1; }
        50%    { opacity: 0.4; }
      }
      @keyframes hpgrow {
        from { width: 0px; }
        to   { width: 52px; }
      }
      @keyframes xpgrow {
        from { width: 0px; }
        to   { width: 112px; }
      }
      @keyframes powergrow {
        from { width: 0px; }
        to   { width: 28px; }
      }
    </style>
  </defs>

  <!-- BG -->
  <rect width="680" height="360" fill="#080b14" rx="14"/>
  <!-- scanline -->
  <rect width="680" height="2" fill="rgba(255,255,255,0.025)" style="animation: scanline 4s linear infinite;"/>
  <!-- grid -->
  <g stroke="#10172a" stroke-width="0.6" opacity="0.7">
    <line x1="0" y1="90"  x2="680" y2="90"/>
    <line x1="0" y1="180" x2="680" y2="180"/>
    <line x1="0" y1="270" x2="680" y2="270"/>
    <line x1="170" y1="0" x2="170" y2="360"/>
    <line x1="340" y1="0" x2="340" y2="360"/>
    <line x1="510" y1="0" x2="510" y2="360"/>
  </g>

  <!-- ═══════════ TITLE ═══════════ -->
  <text x="340" y="24" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ffa3" font-weight="bold"
        style="animation: glitch 6s steps(1) infinite;">
    ⚡ sriansantos.exe — BACK-END FIGHTER ⚡
  </text>

  <!-- ═══════════ TERMINAL (left) ═══════════ -->
  <rect x="18" y="34" width="222" height="192" rx="8" fill="#0d1117" stroke="#00ffa3" stroke-width="0.8" opacity="0.95"/>
  <rect x="18" y="34" width="222" height="20" rx="8" fill="#00ffa3" opacity="0.1"/>
  <circle cx="34"  cy="44" r="4" fill="#ff5f56"/>
  <circle cx="48"  cy="44" r="4" fill="#ffbd2e"/>
  <circle cx="62"  cy="44" r="4" fill="#27c93f"/>
  <text x="90" y="48" font-family="monospace" font-size="9" fill="#00ffa3" opacity="0.6">sriansantos — fight.java</text>

  <g font-family="monospace" font-size="10.5" fill="#00ffa3">
    <text x="28" y="72"  style="animation: typeline 1.1s steps(22,end) both 0.2s; clip-path:inset(0 100% 0 0);">
      <tspan fill="#7c7cff">public class</tspan> <tspan fill="#ffd700">Fighter</tspan> <tspan>{</tspan>
    </text>
    <text x="38" y="88"  style="animation: typeline 1s steps(20,end) both 0.9s; clip-path:inset(0 100% 0 0);">
      <tspan fill="#ff7c7c">@Autowired</tspan>
    </text>
    <text x="38" y="104" style="animation: typeline 1.1s steps(24,end) both 1.5s; clip-path:inset(0 100% 0 0);">
      <tspan fill="#ff7c7c">SpringBoot</tspan><tspan> power;</tspan>
    </text>
    <text x="38" y="120" style="animation: typeline 1.1s steps(22,end) both 2.0s; clip-path:inset(0 100% 0 0);">
      <tspan fill="#7c7cff">void</tspan> <tspan fill="#ffd700">attack</tspan><tspan>() {</tspan>
    </text>
    <text x="50" y="136" style="animation: typeline 1.2s steps(26,end) both 2.6s; clip-path:inset(0 100% 0 0);">
      <tspan>SQL.</tspan><tspan fill="#ffd700">query</tspan><tspan>(</tspan><tspan fill="#ff9f43">"SELECT *"</tspan><tspan>);</tspan>
    </text>
    <text x="50" y="152" style="animation: typeline 1.1s steps(24,end) both 3.1s; clip-path:inset(0 100% 0 0);">
      <tspan>Python.</tspan><tspan fill="#ffd700">script</tspan><tspan>(</tspan><tspan fill="#ff9f43">n8n</tspan><tspan>);</tspan>
    </text>
    <text x="50" y="168" style="animation: typeline 1.0s steps(20,end) both 3.6s; clip-path:inset(0 100% 0 0);">
      <tspan>Docker.</tspan><tspan fill="#ffd700">deploy</tspan><tspan>();</tspan>
    </text>
    <text x="38" y="184" style="animation: typeline 0.5s steps(6,end) both 4.0s; clip-path:inset(0 100% 0 0);">
      <tspan>}</tspan>
    </text>
    <text x="28" y="200" style="animation: typeline 0.4s steps(4,end) both 4.3s; clip-path:inset(0 100% 0 0);">
      <tspan>}</tspan>
    </text>
  </g>
  <rect x="28" y="206" width="7" height="11" fill="#00ffa3" style="animation: cursor 1s step-end infinite 4.5s;"/>

  <!-- ═══════════ FIGHTER (center) ═══════════ -->
  <g transform="translate(285,38)">
    <!-- aura -->
    <ellipse cx="42" cy="152" rx="30" ry="12" fill="#00ffa3" opacity="0.18" style="animation: flamepulse 0.7s ease-in-out infinite alternate;"/>
    <ellipse cx="42" cy="148" rx="18" ry="7"  fill="#ffd700" opacity="0.15" style="animation: flamepulse 0.55s ease-in-out infinite alternate 0.2s;"/>

    <!-- legs -->
    <rect x="22" y="110" width="14" height="36" rx="3" fill="#1e40af"/>
    <rect x="48" y="110" width="14" height="36" rx="3" fill="#1e40af"/>
    <rect x="16" y="142" width="22" height="9"  rx="3" fill="#111827"/>
    <rect x="48" y="142" width="24" height="9"  rx="3" fill="#111827"/>

    <!-- torso -->
    <rect x="20" y="60" width="44" height="54" rx="5" fill="#1d4ed8"/>
    <rect x="30" y="62" width="24" height="11" rx="2" fill="#1e3a8a"/>
    <!-- shirt text -->
    <text x="31" y="93" font-family="monospace" font-size="13" fill="#00ffa3" font-weight="bold">&lt;/&gt;</text>

    <!-- head -->
    <g style="animation: blink 5s ease-in-out infinite 1s;">
      <rect x="24" y="20"  width="36" height="36" rx="6"  fill="#fbbf24"/>
      <rect x="31" y="31"  width="6"  height="7"  rx="1"  fill="#1a1a2e"/>
      <rect x="47" y="31"  width="6"  height="7"  rx="1"  fill="#1a1a2e"/>
    </g>
    <!-- eyebrows angry -->
    <line x1="29" y1="26" x2="39" y2="30" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="26" x2="45" y2="30" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- mouth -->
    <rect x="35" y="44" width="14" height="4" rx="2" fill="#92400e"/>
    <!-- headband -->
    <rect x="24" y="22" width="36" height="7" rx="3" fill="#dc2626"/>
    <text x="28" y="29" font-family="monospace" font-size="6" fill="#fff" font-weight="bold">Rian</text>
    <!-- glasses -->
    <rect x="29" y="30" width="10" height="9" rx="2" fill="none" stroke="#00ffa3" stroke-width="1.2"/>
    <rect x="45" y="30" width="10" height="9" rx="2" fill="none" stroke="#00ffa3" stroke-width="1.2"/>
    <line x1="39" y1="34" x2="45" y2="34" stroke="#00ffa3" stroke-width="1"/>

    <!-- left arm -->
    <rect x="5"  y="62" width="15" height="38" rx="4" fill="#1d4ed8"/>
    <rect x="1"  y="96" width="20" height="13" rx="4" fill="#fbbf24"/>

    <!-- right arm PUNCH -->
    <g style="animation: punch 2s ease-in-out infinite 0.6s; transform-origin: 64px 72px;">
      <rect x="64" y="62" width="14" height="26" rx="4" fill="#1d4ed8"/>
      <rect x="68" y="84" width="24" height="17" rx="5" fill="#fbbf24"/>
      <line x1="74" y1="86" x2="74" y2="99" stroke="#d97706" stroke-width="0.9"/>
      <line x1="80" y1="86" x2="80" y2="99" stroke="#d97706" stroke-width="0.9"/>
      <line x1="86" y1="86" x2="86" y2="99" stroke="#d97706" stroke-width="0.9"/>
    </g>

    <!-- shockwaves -->
    <circle cx="98" cy="92" r="0" fill="none" stroke="#00ffa3" stroke-width="2"   style="animation: shockwave 2s ease-out infinite 1.0s;"/>
    <circle cx="98" cy="92" r="0" fill="none" stroke="#ffd700" stroke-width="1.5" style="animation: shockwave 2s ease-out infinite 1.2s;"/>

    <!-- POW text -->
    <g style="animation: punch 2s ease-in-out infinite 0.8s; transform-origin: 112px 80px;">
      <text x="100" y="84" font-family="monospace" font-size="15" fill="#ffd700" font-weight="bold"
            style="animation: glitch 2s steps(1) infinite 0.8s;">POW!</text>
    </g>
  </g>

 <!-- ═══════════ STATUS BAR (bottom) ═══════════ -->
  <rect x="18" y="238" width="644" height="108" rx="8" fill="#0d1117" stroke="#00ffa3" stroke-width="0.7" opacity="0.95"/>
  <rect x="18" y="238" width="644" height="18"  rx="8" fill="#00ffa3" opacity="0.07"/>
  <text x="30" y="251" font-family="monospace" font-size="8.5" fill="#00ffa3" opacity="0.55">STATUS ■ sriansantos.exe ■ v1.0</text>

  <!-- divisor vertical -->
  <line x1="400" y1="256" x2="400" y2="340" stroke="#00ffa3" stroke-width="0.4" opacity="0.25"/>

  <!-- POWER bar (commits) -->
  <text x="30"  y="274" font-family="monospace" font-size="10" fill="#6b7280">POWER</text>
  <rect x="86"  y="264" width="160" height="11" rx="5" fill="#1f2937"/>
  <rect x="86"  y="264" width="52"  height="11" rx="5" fill="#ffd700" style="animation: hpgrow 1.2s ease-out both 0.5s;"/>
  <text x="254" y="274" font-family="monospace" font-size="9" fill="#fcd34d" id="commits-label">65 commits</text>

  <!-- XP bar -->
  <text x="30"  y="294" font-family="monospace" font-size="10" fill="#6b7280">XP</text>
  <rect x="86"  y="284" width="160" height="11" rx="5" fill="#1f2937"/>
  <rect x="86"  y="284" width="112" height="11" rx="5" fill="#6366f1" style="animation: xpgrow 1.4s ease-out both 0.7s;"/>
  <text x="254" y="294" font-family="monospace" font-size="9" fill="#a5b4fc">Back-End LVL</text>

  <!-- COMBO bar -->
  <text x="30"  y="314" font-family="monospace" font-size="10" fill="#6b7280">COMBO</text>
  <rect x="86"  y="304" width="160" height="11" rx="5" fill="#1f2937"/>
  <rect x="86"  y="304" width="128" height="11" rx="5" fill="#22c55e" style="animation: powergrow 1s ease-out both 0.9s;"/>
  <text x="254" y="314" font-family="monospace" font-size="9" fill="#4ade80">Spring + WP</text>

  <!-- right side stats -->
  <text x="416" y="268" font-family="monospace" font-size="10" fill="#00ffa3">LANG:</text>
  <text x="468" y="268" font-family="monospace" font-size="9.5" fill="#ffd700">Java · Python · SQL</text>

  <text x="416" y="288" font-family="monospace" font-size="10" fill="#00ffa3">DB:</text>
  <text x="468" y="288" font-family="monospace" font-size="9.5" fill="#fb923c">PG · Oracle · MySQL</text>

  <text x="416" y="308" font-family="monospace" font-size="10" fill="#00ffa3">CLASS:</text>
  <text x="468" y="308" font-family="monospace" font-size="9.5" fill="#a78bfa">Back-end Warrior</text>

  <!-- LVL badge -->
  <text x="30"  y="336" font-family="monospace" font-size="9" fill="#ffd700" style="animation: comboflash 2s ease-in-out infinite;">★ sriansantos ★</text>
  <text x="416" y="336" font-family="monospace" font-size="9" fill="#00ffa3" opacity="0.6">github.com/sriansantos</text>
</svg>
